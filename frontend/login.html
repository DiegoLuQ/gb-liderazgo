<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Liderazgo</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <h1>Sistema de Acompañamiento</h1>
            <h2>Liderazgo Docente</h2>
            
            <div id="loginSection">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                </form>
                <p class="auth-switch">
                    ¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a>
                </p>
            </div>

            <div id="registerSection" style="display: none;">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">Usuario</label>
                        <input type="text" id="regUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Correo electrónico</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Contraseña</label>
                        <input type="password" id="regPassword" required minlength="4">
                    </div>
                    <div class="form-group">
                        <label for="regPasswordConfirm">Confirmar Contraseña</label>
                        <input type="password" id="regPasswordConfirm" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Crear Cuenta</button>
                </form>
                <p class="auth-switch">
                    ¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia sesión</a>
                </p>
            </div>

            <p id="authMessage" class="message"></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
